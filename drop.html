<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>emit — Secure Download</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            background: #030305;
            background-image: radial-gradient(circle at 20% 40%, #100b1a 0%, #030305 60%);
            color: #ededed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .logo { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.03em; position: fixed; top: 2.5rem; left: 4rem; }
        .card {
            background: #141416;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 3rem;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }
        .lock-icon { font-size: 3rem; color: #10b981; margin-bottom: 1.5rem; }
        .title { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 0.75rem; }
        .filename {
            font-size: 1.1rem; font-weight: 600;
            background: #1e1e20; border-radius: 10px; padding: 0.75rem 1.25rem;
            margin: 1.25rem 0; color: #fff;
        }
        .meta { font-size: 0.85rem; color: #71717a; margin-bottom: 0.5rem; }
        .status { font-size: 0.9rem; color: #a1a1aa; margin: 1.5rem 0; line-height: 1.6; }
        .btn-download {
            display: inline-flex; align-items: center; gap: 0.6rem;
            background: #fff; color: #030305;
            border: none; border-radius: 999px;
            padding: 1rem 2.5rem; font-family: inherit;
            font-size: 1rem; font-weight: 700; cursor: pointer;
            transition: all 0.2s ease; width: 100%; justify-content: center;
            margin-top: 0.5rem;
        }
        .btn-download:hover { background: #e5e5e5; }
        .btn-download:disabled { opacity: 0.5; cursor: not-allowed; }
        .badge-e2e {
            display: inline-flex; align-items: center; gap: 0.4rem;
            font-size: 0.75rem; font-weight: 700; letter-spacing: 0.05em;
            color: #10b981; border: 1px solid rgba(16,185,129,0.25);
            border-radius: 999px; padding: 0.3rem 0.8rem; margin-top: 1.5rem;
        }
        footer { position: fixed; bottom: 1.5rem; font-size: 0.75rem; color: #3f3f46; text-align: center; width: 100%; left: 0; }

        @media (max-width: 480px) {
            .logo { position: static; margin-top: 2rem; margin-bottom: 2rem; text-align: center; }
            .card { padding: 2rem 1.5rem; border-radius: 16px; width: 92%; }
            .title { font-size: 1.5rem; }
            .btn-download { padding: 0.875rem 1.5rem; font-size: 0.95rem; }
            footer { position: static; margin-top: 2rem; margin-bottom: 1.5rem; }
            body { justify-content: flex-start; }
        }
    </style>
</head>
<body>
    <div class="logo">emit</div>

    <div class="card">
        <div class="lock-icon"><i class="fa-solid fa-file-shield"></i></div>
        <h1 class="title">Secure File Drop</h1>
        <p class="status">This file was encrypted in the sender's browser before upload. Your download will be decrypted locally — the server never sees the plaintext.</p>

        <div class="filename" id="drop-filename">Loading...</div>
        <div class="meta" id="drop-size"></div>
        <div class="status" id="drop-status">Verifying drop...</div>

        <button id="drop-download-btn" class="btn-download">
            <i class="fa-solid fa-arrow-down"></i>
            Download & Decrypt
        </button>

        <div class="badge-e2e">
            <i class="fa-solid fa-lock"></i>
            AES-GCM 256-bit · Decrypted in Browser
        </div>
    </div>

    <footer>&copy; 2026 Yoyon. All rights reserved.</footer>

    <script src="hosted-drop.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            const isDropPage = await receiveHostedDrop();
            if (!isDropPage) {
                document.getElementById('drop-status').textContent = 'No drop token found. This link may be invalid.';
                document.getElementById('drop-download-btn').disabled = true;
            }
        });
    </script>
</body>
</html>
